<html xmlns:th="http://www.thymeleaf.org">  
<html>
<head>
  <title>Edit</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head> 
  <body>  
<div w3-include-html="http://localhost:9500/include/header.html"></div>
<div class="container">
<div class="row">
<div class="col-md-12">
        <h1 class="my-5">Edit</h1>  
<form method="POST" th:action="@{/new/edit/{id}(id=*{bookId})}" th:object="${bookEditResponseDTO}">
<p>
  <label for="" class="form-label">제목 :</label>
  <input type="text" name="title" th:value="*{title}" class="form-control">
</p>
<p>
  <label for="" class="form-label">가격 :</label>
  <input type="text" name="price" th:value="*{price}" class="form-control">
</p>
<div class="d-flex justify-content-end my-5">
  <div class="btn-group">
    <input type="submit" value="수정" class="btn btn-outline-success"/>
  </div>
</div>
</form> 
</div>
</div>
</div> 

<div w3-include-html="http://localhost:9500/include/footer.html"></div>
<script src="http://localhost:9500/js/js.js"></script>
<script>
includeHTML();//함수 호출
</script>
  </body>  
</html>
